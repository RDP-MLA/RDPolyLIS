<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RDPolyLIS v2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--sidebar:210px;--topbar:48px}
body{font-family:system-ui,sans-serif;font-size:13px;background:#f5f5f3;color:#111;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:#fff;border-right:0.5px solid #e5e5e5;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.logo{padding:14px 16px;border-bottom:0.5px solid #e5e5e5}
.logo-name{font-size:14px;font-weight:500}
.logo-sub{font-size:10px;color:#666;margin-top:1px}
.nav-group{padding:8px 0}
.nav-label{font-size:10px;font-weight:500;color:#999;padding:6px 14px 3px;letter-spacing:.06em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;font-size:12px;color:#555;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:#f5f5f3;color:#111}
.nav-item.active{background:#e6f1fb;color:#185fa5;border-left-color:#185fa5;font-weight:500}
.nav-item i{font-size:15px;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--topbar);background:#fff;border-bottom:0.5px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}
.topbar-right{display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:0.5px solid #ccc;border-radius:6px;background:#fff;color:#111;cursor:pointer;font-size:12px;font-weight:500;transition:background .12s;font-family:inherit}
.btn:hover{background:#f5f5f3}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:#e6f1fb;color:#185fa5;border-color:transparent}
.btn-primary:hover{opacity:.85}
.btn-success{background:#eaf3de;color:#3b6d11;border-color:transparent}
.btn-danger{background:#fcebeb;color:#a32d2d;border-color:transparent}
.btn-warning{background:#faeeda;color:#854f0b;border-color:transparent}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-icon{padding:5px;border-radius:6px;border:0.5px solid #e5e5e5}
.card{background:#fff;border:0.5px solid #e5e5e5;border-radius:10px;padding:16px 18px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:#666;margin-bottom:3px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:6px 9px;border:0.5px solid #ccc;border-radius:6px;background:#fff;color:#111;font-size:12px;font-family:inherit}
.field textarea{min-height:54px;resize:vertical}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-size:10px;font-weight:500;color:#666;padding:6px 10px;border-bottom:0.5px solid #e5e5e5;white-space:nowrap;background:#f9f9f7}
td{padding:7px 10px;border-bottom:0.5px solid #e5e5e5;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f9f9f7}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:500}
.badge-info{background:#e6f1fb;color:#185fa5}
.badge-success{background:#eaf3de;color:#3b6d11}
.badge-warning{background:#faeeda;color:#854f0b}
.badge-danger{background:#fcebeb;color:#a32d2d}
.badge-gray{background:#f5f5f3;color:#666}
.badge-purple{background:#EEEDFE;color:#3C3489}
.stat{background:#f5f5f3;border-radius:8px;padding:12px 14px}
.stat-label{font-size:10px;color:#666;margin-bottom:3px}
.stat-value{font-size:22px;font-weight:500}
.flag-H{color:#b45309;font-weight:600}
.flag-L{color:#1d4ed8;font-weight:600}
.flag-HH{color:#991b1b;font-weight:700;background:#fef2f2;padding:0 3px;border-radius:3px}
.flag-LL{color:#1e3a8a;font-weight:700;background:#eff6ff;padding:0 3px;border-radius:3px}
.crit-row td{background:#fcebeb!important}
.reject-row td{background:#faeeda!important}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;border:0.5px solid #e5e5e5;width:640px;max-width:100%;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-header{padding:14px 18px;border-bottom:0.5px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:500;position:sticky;top:0;background:#fff;z-index:1}
.modal-body{padding:18px;flex:1}
.modal-footer{padding:12px 18px;border-top:0.5px solid #e5e5e5;display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff}
.ai-wrap{border:0.5px solid #e5e5e5;border-radius:10px;overflow:hidden;background:#fff}
.ai-messages{padding:14px;max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.ai-msg-wrap{display:flex;flex-direction:column;gap:2px}
.ai-from{font-size:10px;color:#666}
.ai-bubble{border-radius:8px;padding:9px 12px;font-size:12px;line-height:1.6}
.ai-bubble.assistant{background:#f5f5f3}
.ai-bubble.user{background:#e6f1fb;color:#185fa5;margin-left:30px}
.ai-input-row{display:flex;gap:8px;padding:10px 14px;border-top:0.5px solid #e5e5e5}
.ai-input-row input{flex:1;padding:6px 10px;border:0.5px solid #ccc;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;color:#111}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:6px;font-size:11px;border:0.5px solid #e5e5e5;background:#f9f9f7;cursor:pointer}
.chip.selected{background:#e6f1fb;color:#185fa5;border-color:#185fa5}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:#185fa5;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.info-box{background:#e6f1fb;border-radius:8px;padding:10px 14px;font-size:12px;color:#185fa5;margin-bottom:12px}
.warn-box{background:#faeeda;border-radius:8px;padding:10px 14px;font-size:12px;color:#854f0b;margin-bottom:12px}
.danger-box{background:#fcebeb;border-radius:8px;padding:10px 14px;font-size:12px;color:#a32d2d;margin-bottom:12px}
.empty{text-align:center;padding:36px 20px;color:#666}
.inline-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
@media print{
  .sidebar,.topbar,.btn,.nav-item{display:none!important}
  .main{overflow:visible}.content{padding:0}
  body{height:auto;overflow:visible;background:#fff;color:#000}.app{display:block}
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-name">RDPolyLIS <span style="font-size:10px;color:#666">v2</span></div>
      <div class="logo-sub">Educational Lab Information System</div>
    </div>
    <div class="nav-group">
      <div class="nav-label">Workflow</div>

      <div class="nav-item" onclick="nav('chem')" id="nav-chem"><i class="ti ti-flask"></i>Chemistry</div>

      <div class="nav-item" onclick="nav('transfusion')" id="nav-transfusion"><i class="ti ti-heart-rate-monitor"></i>Transfusion</div>

      <div class="nav-item" onclick="nav('rejected')" id="nav-rejected"><i class="ti ti-ban"></i>Rejected Specimens</div>
      <div class="nav-item" onclick="nav('checklist')" id="nav-checklist"><i class="ti ti-checkbox"></i>Competency Checklist</div>
      <div class="nav-item" onclick="nav('ai')" id="nav-ai"><i class="ti ti-robot"></i>AI Interpreter</div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title"><i class="ti ti-layout-dashboard"></i>Dashboard</div>
      <div class="topbar-right" id="topbar-right"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="modal-bg" id="modal" style="display:none" onclick="closeModalBg(event)">
  <div class="modal" id="modal-inner"></div>
</div>
<script>

function genAcc(dept){
  const now=new Date();
  const yr=String(now.getFullYear()).slice(2);
  const start=new Date(now.getFullYear(),0,0);
  const day=String(Math.floor((now-start)/86400000)).padStart(3,'0');
  S.testCounter[dept]=(S.testCounter[dept]||0)+1;
  return`${yr}RD-${day}${dept}${String(S.testCounter[dept]).padStart(5,'0')}`;
}
function today(){return new Date().toISOString().slice(0,10);}
function nowTime(){return new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});}
function age(dob){if(!dob)return'?';const d=new Date(dob),t=new Date();let a=t.getFullYear()-d.getFullYear();if(t<new Date(t.getFullYear(),d.getMonth(),d.getDate()))a--;return a;}
function ptName(pt){return pt?`${pt.lastName}, ${pt.firstName}`:'—';}
function statusBadge(s){return{ordered:'badge-info',accessioned:'badge-warning',received:'badge-purple',resulted:'badge-success',verified:'badge-gray',rejected:'badge-danger'}[s]||'badge-gray';}
function statusLabel(s){return{ordered:'Ordered',accessioned:'Accessioned',received:'Received',resulted:'Resulted',verified:'Verified',rejected:'Rejected'}[s]||s;}
function getFlag(key,val,sex){
  const r=REF[key];if(!r||r.qualitative)return{flag:'',cls:''};
  const v=parseFloat(val);if(isNaN(v))return{flag:'',cls:''};
  const s=refSex(sex);let lo=r.lo,hi=r.hi;
  if(s==='F'){if(r.femLo!=null)lo=r.femLo;if(r.femHi!=null)hi=r.femHi;}
  if(r.critLo!=null&&v<=r.critLo)return{flag:'LL',cls:'flag-LL'};
  if(r.critHi!=null&&v>=r.critHi)return{flag:'HH',cls:'flag-HH'};
  if(v<lo)return{flag:'L',cls:'flag-L'};if(v>hi)return{flag:'H',cls:'flag-H'};
  return{flag:'',cls:'flag-N'};
}
function isCrit(key,val,sex){const f=getFlag(key,val,sex);return f.flag==='HH'||f.flag==='LL';}

function recentActivity(){

function critTable(){
  const crits=S.results.filter(r=>r.critical&&!r.callbackDone);
  if(!crits.length)return`<div class="empty" style="padding:12px">No pending critical callbacks</div>`;
  return`<table><thead><tr><th>Patient</th><th>Test</th><th>Value</th><th>Flag</th><th>Accession #</th><th>Action</th></tr></thead><tbody>${crits.map(r=>{const o=S.orders.find(x=>x.id===r.orderId);const pt=o?S.patients.find(p=>p.id===o.patientId):null;const ref=REF[r.testKey];const fl=getFlag(r.testKey,r.value,pt?pt.sex:'M');return`<tr class="crit-row"><td>${ptName(pt)}</td><td>${ref?ref.name:r.testKey}</td><td><span class="${fl.cls}">${r.value} ${ref&&!ref.qualitative?ref.unit:''}</span></td><td><span class="${fl.cls}">${fl.flag}</span></td><td style="font-family:monospace;font-size:11px">${r.accession||''}</td><td><button class="btn btn-sm btn-success" onclick="markCallback('${r.id}')"><i class="ti ti-phone"></i>Callback done</button></td></tr>`;}).join('')}</tbody></table>`;
}

function enterResults(oid){
  const o=S.orders.find(x=>x.id===oid);if(!o)return;
  const pt=S.patients.find(p=>p.id===o.patientId);
  const isPeds=pt&&age(pt.dob)<18;const sex=pt?pt.sex:'M';
  const existing={};S.results.filter(r=>r.orderId===oid).forEach(r=>{existing[r.testKey]=r.value;});
  const nonBinary=(sex==='X'||sex==='U');
  const rows=o.tests.map(tk=>{
    const r=REF[tk];if(!r)return'';
    const rs=refSex(sex);let lo=r.lo,hi=r.hi;
    if(rs==='F'){if(r.femLo!=null)lo=r.femLo;if(r.femHi!=null)hi=r.femHi;}
    const refStr=r.qualitative?r.options.join(' / '):`${lo}–${hi} ${r.unit}`;
    const pedsNote=isPeds&&r.peds?`<span style="color:#854f0b;font-size:10px"> ⚠ Peds: ${r.peds}</span>`:'';
    const nbNote=nonBinary&&(r.femLo!=null)?`<span style="font-size:10px;color:#666"> (unisex)</span>`:'';
    if(r.qualitative){return`<tr><td style="font-weight:500">${r.name}</td><td><select id="res_${tk}" style="padding:4px 6px;border:0.5px solid #ccc;border-radius:5px;font-size:12px;background:#fff;color:#111;font-family:inherit"><option value="">—</option>${r.options.map(op=>`<option ${existing[tk]===op?'selected':''}>${op}</option>`).join('')}</select></td><td style="font-size:11px;color:#666">${refStr}${pedsNote}</td><td id="flag_${tk}"></td></tr>`;}
    return`<tr><td style="font-weight:500">${r.name}</td><td><input id="res_${tk}" type="number" step="any" value="${existing[tk]||''}" style="width:90px;padding:4px 6px;border:0.5px solid #ccc;border-radius:5px;font-size:12px;background:#fff;color:#111;font-family:inherit" oninput="liveFlag('${tk}','${sex}')"></td><td style="font-size:11px;color:#666">${lo}–${hi} ${r.unit}${nbNote}${pedsNote}</td><td id="flag_${tk}"></td></tr>`;
  }).join('');
  openModal(`Enter Results — ${o.accession}`,`
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;font-size:12px;color:#666">
      <strong>${ptName(pt)}</strong><span>${sexLabel(sex)}</span><span>Age ${pt?age(pt.dob):'?'}</span><span>${o.panel}</span>
      ${isPeds?'<span class="badge badge-warning">Paediatric</span>':''}
      ${nonBinary?'<span class="badge badge-purple">Unisex ranges</span>':''}
    </div>
    <table><thead><tr><th>Analyte</th><th>Result</th><th>Reference Range</th><th>Flag</th></tr></thead><tbody>${rows}</tbody></table>
  `,[
    {label:'Cancel',cls:'btn',fn:closeModal},
    {label:'Save Results',cls:'btn btn-primary',fn:()=>{
      S.results=S.results.filter(r=>r.orderId!==oid);let hasCrit=false;
      o.tests.forEach(tk=>{const el=document.getElementById('res_'+tk);if(!el||!el.value)return;const crit=isCrit(tk,el.value,sex);if(crit)hasCrit=true;S.results.push({id:'RES-'+Date.now()+'-'+tk,orderId:oid,testKey:tk,value:el.value,accession:o.accession,critical:crit,callbackDone:false,enteredAt:nowTime(),ts:Date.now()});});
      o.status='resulted';closeModal();
      if(hasCrit)alert('CRITICAL VALUE(S) detected. Notify physician immediately and document callback.');
      nav('verify');
    }}
  ]);
}

      <div class="ua-row"><div>pH</div><select id="ua-ph" onchange="flagSelNum(this,'ua-ph-flag',4.5,8.5)"><option value="">Select...</option><option value="5.0">5.0</option><option value="5.5">5.5</option><option value="6.0">6.0</option><option value="6.5">6.5</option><option value="7.0">7.0</option><option value="7.5">7.5</option><option value="8.0">8.0</option><option value="8.5">8.5</option><option value="9.0">9.0</option></select><div style="font-size:11px;color:var(--tx3);">4.5 – 8.5</div><div id="ua-ph-flag"></div></div>
      <div class="ua-row"><div>Specific Gravity</div><select id="ua-sg" onchange="flagSelNum(this,'ua-sg-flag',1.003,1.030)"><option value="">Select...</option><option value="1.001">1.001</option><option value="1.005">1.005</option><option value="1.010">1.010</option><option value="1.015">1.015</option><option value="1.020">1.020</option><option value="1.025">1.025</option><option value="1.030">1.030</option><option value="1.035">1.035</option></select><div style="font-size:11px;color:var(--tx3);">1.003 – 1.030</div><div id="ua-sg-flag"></div></div>
      <div class="ua-row"><div>Glucose</div><select id="ua-glucose" onchange="flagSel(this,'ua-glucose-flag',['Negative'])"><option value="">Select...</option><option>Negative</option><option>Trace</option><option>1+</option><option>2+</option><option>3+</option><option>4+</option></select><div style="font-size:11px;color:var(--tx3);">Negative</div><div id="ua-glucose-flag"></div></div>
      <div class="ua-row"><div>Protein</div><select id="ua-protein" onchange="flagSel(this,'ua-protein-flag',['Negative','Trace'])"><option value="">Select...</option><option>Negative</option><option>Trace</option><option>1+</option><option>2+</option><option>3+</option><option>4+</option></select><div style="font-size:11px;color:var(--tx3);">Negative/Trace</div><div id="ua-protein-flag"></div></div>

      <div class="ua-row"><div>Ketones</div><select id="ua-ketones" onchange="flagSel(this,'ua-ketones-flag',['Negative'])"><option value="">Select...</option><option>Negative</option><option>Trace</option><option>1+</option><option>2+</option><option>3+</option></select><div style="font-size:11px;color:var(--tx3);">Negative</div><div id="ua-ketones-flag"></div></div>
      <div class="ua-row"><div>Bilirubin</div><select id="ua-bili" onchange="flagSel(this,'ua-bili-flag',['Negative'])"><option value="">Select...</option><option>Negative</option><option>1+</option><option>2+</option><option>3+</option></select><div style="font-size:11px;color:var(--tx3);">Negative</div><div id="ua-bili-flag"></div></div>

        <div class="micro-card" style="grid-column:span 2;"><div class="micro-lbl">Comment</div><textarea id="ua-comment" placeholder="Mucus, specimen quality, other findings..." style="min-height:44px;font-size:12px;width:100%;"></textarea></div>

// Department sequences — reset daily, tracked per dept
const DEPT_SEQ = {H:1,C:1,O:1,M:1,T:1};
let DEPT_SEQ_DATE = todayStr();

function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function julianDate(d){
  const start=new Date(d.getFullYear(),0,0);
  const diff=d-start;
  return String(Math.floor(diff/86400000)).padStart(3,'0');
}

function nextAccn(deptCode){
  const today=todayStr();
  if(today!==DEPT_SEQ_DATE){Object.keys(DEPT_SEQ).forEach(k=>DEPT_SEQ[k]=1);DEPT_SEQ_DATE=today;}
  const d=new Date();
  const yy=String(d.getFullYear()).slice(-2);
  const jd=julianDate(d);
  const seq=String(DEPT_SEQ[deptCode]).padStart(5,'0');
  const accn=yy+'RD'+jd+deptCode+seq;
  DEPT_SEQ[deptCode]++;
  return accn;
}

function buildMenus(){

    'og-endo':TESTS.endo,'og-ua':TESTS.ua,'og-micro':TESTS.micro,'og-tm':TESTS.tm};
  for(const [id,arr] of Object.entries(map)){

      <div class="oi" id="oi-${t.code}" onclick="toggleTest('${t.code}')">

      </div>`).join('');

function toggleTest(code){
  const el=document.getElementById('oi-'+code);
  const i=S.orders.indexOf(code);
  if(i>-1){S.orders.splice(i,1);el.classList.remove('sel');}
  else{S.orders.push(code);el.classList.add('sel');}
  document.getElementById('ord-count').textContent=S.orders.length+' tests selected';
}

function clearOrders(){
  S.orders=[];document.querySelectorAll('.oi').forEach(e=>e.classList.remove('sel'));
  document.getElementById('ord-count').textContent='0 tests selected';

  if(!S.active){document.getElementById('ord-nopt').style.display='';document.getElementById('ord-form').style.display='none';}
  else{
    document.getElementById('ord-nopt').style.display='none';document.getElementById('ord-form').style.display='';
    document.getElementById('ord-ptname').textContent=S.active.fn+' '+S.active.ln;
