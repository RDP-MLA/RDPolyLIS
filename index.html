<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RDPolyLIS v2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--sidebar:210px;--topbar:48px}
body{font-family:system-ui,sans-serif;font-size:13px;background:#f5f5f3;color:#111;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:#fff;border-right:0.5px solid #e5e5e5;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.logo{padding:14px 16px;border-bottom:0.5px solid #e5e5e5}
.logo-name{font-size:14px;font-weight:500}
.logo-sub{font-size:10px;color:#666;margin-top:1px}
.nav-group{padding:8px 0}
.nav-label{font-size:10px;font-weight:500;color:#999;padding:6px 14px 3px;letter-spacing:.06em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;font-size:12px;color:#555;border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:#f5f5f3;color:#111}
.nav-item.active{background:#e6f1fb;color:#185fa5;border-left-color:#185fa5;font-weight:500}
.nav-item i{font-size:15px;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--topbar);background:#fff;border-bottom:0.5px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}
.topbar-right{display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:0.5px solid #ccc;border-radius:6px;background:#fff;color:#111;cursor:pointer;font-size:12px;font-weight:500;transition:background .12s;font-family:inherit}
.btn:hover{background:#f5f5f3}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:#e6f1fb;color:#185fa5;border-color:transparent}
.btn-primary:hover{opacity:.85}
.btn-success{background:#eaf3de;color:#3b6d11;border-color:transparent}
.btn-danger{background:#fcebeb;color:#a32d2d;border-color:transparent}
.btn-warning{background:#faeeda;color:#854f0b;border-color:transparent}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-icon{padding:5px;border-radius:6px;border:0.5px solid #e5e5e5}
.card{background:#fff;border:0.5px solid #e5e5e5;border-radius:10px;padding:16px 18px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:#666;margin-bottom:3px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:6px 9px;border:0.5px solid #ccc;border-radius:6px;background:#fff;color:#111;font-size:12px;font-family:inherit}
.field textarea{min-height:54px;resize:vertical}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-size:10px;font-weight:500;color:#666;padding:6px 10px;border-bottom:0.5px solid #e5e5e5;white-space:nowrap;background:#f9f9f7}
td{padding:7px 10px;border-bottom:0.5px solid #e5e5e5;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f9f9f7}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:500}
.badge-info{background:#e6f1fb;color:#185fa5}
.badge-success{background:#eaf3de;color:#3b6d11}
.badge-warning{background:#faeeda;color:#854f0b}
.badge-danger{background:#fcebeb;color:#a32d2d}
.badge-gray{background:#f5f5f3;color:#666}
.badge-purple{background:#EEEDFE;color:#3C3489}
.stat{background:#f5f5f3;border-radius:8px;padding:12px 14px}
.stat-label{font-size:10px;color:#666;margin-bottom:3px}
.stat-value{font-size:22px;font-weight:500}
.flag-H{color:#b45309;font-weight:600}
.flag-L{color:#1d4ed8;font-weight:600}
.flag-HH{color:#991b1b;font-weight:700;background:#fef2f2;padding:0 3px;border-radius:3px}
.flag-LL{color:#1e3a8a;font-weight:700;background:#eff6ff;padding:0 3px;border-radius:3px}
.crit-row td{background:#fcebeb!important}
.reject-row td{background:#faeeda!important}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;border:0.5px solid #e5e5e5;width:640px;max-width:100%;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-header{padding:14px 18px;border-bottom:0.5px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:500;position:sticky;top:0;background:#fff;z-index:1}
.modal-body{padding:18px;flex:1}
.modal-footer{padding:12px 18px;border-top:0.5px solid #e5e5e5;display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:6px;font-size:11px;border:0.5px solid #e5e5e5;background:#f9f9f7;cursor:pointer}
.chip.selected{background:#e6f1fb;color:#185fa5;border-color:#185fa5}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:#185fa5;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.info-box{background:#e6f1fb;border-radius:8px;padding:10px 14px;font-size:12px;color:#185fa5;margin-bottom:12px}
.warn-box{background:#faeeda;border-radius:8px;padding:10px 14px;font-size:12px;color:#854f0b;margin-bottom:12px}
.danger-box{background:#fcebeb;border-radius:8px;padding:10px 14px;font-size:12px;color:#a32d2d;margin-bottom:12px}
.empty{text-align:center;padding:36px 20px;color:#666}
.sync-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:#666}
.sync-bar select{padding:4px 6px;border:0.5px solid #ccc;border-radius:5px;font-size:11px;background:#fff;color:#111;font-family:inherit}
.sync-status{font-size:10px;color:#666;white-space:nowrap}
@media print{
  .sidebar,.topbar,.btn,.nav-item{display:none!important}
  .main{overflow:visible}.content{padding:0}
  body{height:auto;overflow:visible;background:#fff;color:#000}.app{display:block}
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-name">RDPolyLIS <span style="font-size:10px;color:#666">v2</span></div>
      <div class="logo-sub">Educational Lab Information System</div>
    </div>
    <div class="nav-group">
      <div class="nav-label">Workflow</div>
      <div class="nav-item active" onclick="nav('dashboard')" id="nav-dashboard"><i class="ti ti-layout-dashboard"></i>Dashboard</div>
      <div class="nav-item" onclick="nav('patients')" id="nav-patients"><i class="ti ti-user"></i>Patients</div>
      <div class="nav-item" onclick="nav('orders')" id="nav-orders"><i class="ti ti-clipboard-list"></i>Order Entry</div>
      <div class="nav-item" onclick="nav('accession')" id="nav-accession"><i class="ti ti-barcode"></i>Accessioning</div>

    </div>

      <div class="nav-item" onclick="nav('heme')" id="nav-heme"><i class="ti ti-drop"></i>Hematology</div>
      <div class="nav-item" onclick="nav('coag')" id="nav-coag"><i class="ti ti-activity"></i>Coagulation</div>
      <div class="nav-item" onclick="nav('chem')" id="nav-chem"><i class="ti ti-flask"></i>Chemistry</div>
      <div class="nav-item" onclick="nav('ua')" id="nav-ua"><i class="ti ti-test-pipe"></i>Urinalysis</div>
      <div class="nav-item" onclick="nav('transfusion')" id="nav-transfusion"><i class="ti ti-heart-rate-monitor"></i>Transfusion</div>
    </div>
    <div class="nav-group">
      <div class="nav-label">Tools</div>
      <div class="nav-item" onclick="nav('rejected')" id="nav-rejected"><i class="ti ti-ban"></i>Rejected Specimens</div>
      <div class="nav-item" onclick="nav('checklist')" id="nav-checklist"><i class="ti ti-checkbox"></i>Competency Checklist</div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title"><i class="ti ti-layout-dashboard"></i>Dashboard</div>
      <div style="display:flex;align-items:center;gap:16px">
        <div class="sync-bar">
          <select id="syncDay" onchange="onSyncDayChange()">
            <option value="">Day --</option>
            <option value="mon">Monday</option>
            <option value="tue">Tuesday</option>
            <option value="wed">Wednesday</option>
            <option value="thu">Thursday</option>
            <option value="fri">Friday</option>
          </select>
          <button class="btn btn-sm" onclick="loadFromServer()"><i class="ti ti-download"></i>Load</button>
          <button class="btn btn-sm btn-primary" onclick="saveToServer()"><i class="ti ti-cloud-upload"></i>Save</button>
          <span class="sync-status" id="syncStatus">Not saved yet</span>
        </div>
        <div class="topbar-right" id="topbar-right"></div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="modal-bg" id="modal" style="display:none" onclick="closeModalBg(event)">
  <div class="modal" id="modal-inner"></div>
</div>
<script>

const S = {
  patients: [], orders: [], results: [],
  currentPage: 'dashboard',
  testCounter: {H:0,O:0,C:0,U:0,T:0,M:0,R:0},
  _quickOrderPt: null
};

const SYNC_API_BASE = 'https://rapid-bush-dc12.jacklyn-mireault.workers.dev';
let syncBusy = false;

function todayWeekdayKey() {
  const d = new Date().getDay(); // 0=Sun,1=Mon,...6=Sat
  const map = {1:'mon',2:'tue',3:'wed',4:'thu',5:'fri'};
  return map[d] || '';
}

function setSyncStatus(msg) {
  const el = document.getElementById('syncStatus');
  if (el) el.textContent = msg;
}

function onSyncDayChange() {
  // Just remembers the selection; actual load/save happens on button press.
}

async function saveToServer() {
  if (syncBusy) return;
  const day = document.getElementById('syncDay').value;
  if (!day) { alert('Please select a day (Mon-Fri) before saving.'); return; }
  syncBusy = true;
  setSyncStatus('Saving...');
  try {
    const payload = {
      patients: S.patients,
      orders: S.orders,
      results: S.results,
      testCounter: S.testCounter
    };
    const res = await fetch(SYNC_API_BASE + '/state?day=' + day, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('Server returned ' + res.status);
    setSyncStatus('Last saved: ' + nowTime());
  } catch (err) {
    setSyncStatus('Save failed - try again');
    alert('Saving failed. Please check your internet connection and try again.\n\n(' + err.message + ')');
  } finally {
    syncBusy = false;
  }
}

async function loadFromServer() {
  if (syncBusy) return;
  const day = document.getElementById('syncDay').value;
  if (!day) { alert('Please select a day (Mon-Fri) before loading.'); return; }
  const confirmed = confirm('Loading will completely replace everything on this screen with the last SAVED version for this day.\n\nAny changes made since your last Save (including new patients, orders, or results) will be LOST and cannot be recovered.\n\nContinue with Load?');
  if (!confirmed) return;
  syncBusy = true;
  setSyncStatus('Loading...');
  try {
    const res = await fetch(SYNC_API_BASE + '/state?day=' + day, { method: 'GET' });
    if (!res.ok) throw new Error('Server returned ' + res.status);
    const data = await res.json();
    if (data && Object.keys(data).length > 0) {
      S.patients = data.patients || [];
      S.orders = data.orders || [];
      S.results = data.results || [];
      S.testCounter = data.testCounter || {H:0,O:0,C:0,U:0,T:0,M:0,R:0};
      const now = nowTime();
      setSyncStatus('Loaded at: ' + now);
    } else {
      setSyncStatus('No saved data for this day yet');
    }
    nav('dashboard');
  } catch (err) {
    setSyncStatus('Load failed - try again');
    alert('Loading failed. Please check your internet connection and try again.\n\n(' + err.message + ')');
  } finally {
    syncBusy = false;
  }
}

function genAcc(dept) {
  const now = new Date();
  const yr = String(now.getFullYear()).slice(2);
  const start = new Date(now.getFullYear(),0,0);
  const day = String(Math.floor((now-start)/86400000)).padStart(3,'0');
  S.testCounter[dept] = (S.testCounter[dept]||0)+1;
  return yr+'RD-'+day+dept+String(S.testCounter[dept]).padStart(5,'0');
}
function today() { return new Date().toISOString().slice(0,10); }
function nowTime() {
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return hh+mm;
}
function age(dob) {
  if(!dob) return '?';
  const d=new Date(dob), t=new Date();
  let a=t.getFullYear()-d.getFullYear();
  if(t<new Date(t.getFullYear(),d.getMonth(),d.getDate())) a--;
  return a;
}
function ptName(pt) { return pt ? pt.lastName+', '+pt.firstName : '--'; }
function statusBadge(s) { return {ordered:'badge-info',accessioned:'badge-warning',received:'badge-purple',resulted:'badge-success',verified:'badge-gray',rejected:'badge-danger'}[s]||'badge-gray'; }
function statusLabel(s) { return {ordered:'Ordered',accessioned:'Accessioned',received:'Received',resulted:'Resulted',verified:'Verified',rejected:'Rejected'}[s]||s; }

function getFlag(key,val,sex) {
  const r=REF[key];
  if(!r||r.qualitative) return {flag:'',cls:''};
  const v=parseFloat(val);
  if(isNaN(v)) return {flag:'',cls:''};
  const rs=refSex(sex);
  let lo=r.lo, hi=r.hi;
  if(rs==='F') { if(r.femLo!=null) lo=r.femLo; if(r.femHi!=null) hi=r.femHi; }
  if(r.critLo!=null&&v<=r.critLo) return {flag:'LL',cls:'flag-LL'};
  if(r.critHi!=null&&v>=r.critHi) return {flag:'HH',cls:'flag-HH'};
  if(v<lo) return {flag:'L',cls:'flag-L'};
  if(v>hi) return {flag:'H',cls:'flag-H'};
  return {flag:'',cls:'flag-N'};
}
function isCrit(key,val,sex) { const f=getFlag(key,val,sex); return f.flag==='HH'||f.flag==='LL'; }

function openModal(title, body, buttons) {
  const btns = buttons||[{label:'Close',cls:'btn',fn:closeModal}];
  const btnHtml = btns.map(b=>'<button class="btn '+b.cls+'" id="mb_'+b.label.replace(/\W/g,'_')+'">'+b.label+'</button>').join('');
  document.getElementById('modal-inner').innerHTML =
    '<div class="modal-header"><span>'+title+'</span><button class="btn btn-icon btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button></div>'+
    '<div class="modal-body">'+body+'</div>'+
    '<div class="modal-footer">'+btnHtml+'</div>';
  document.getElementById('modal').style.display='flex';
  btns.forEach(b=>{ const el=document.getElementById('mb_'+b.label.replace(/\W/g,'_')); if(el&&b.fn) el.onclick=b.fn; });
}
function closeModal() { document.getElementById('modal').style.display='none'; }

  const verified=S.orders.filter(o=>o.status==='verified').length;
  const rejected=S.orders.filter(o=>o.status==='rejected').length;
  const crits=S.results.filter(r=>r.critical&&!r.callbackDone).length;
  const recent=[...S.orders].sort((a,b)=>b.ts-a.ts).slice(0,6)
    .map(o=>{ const pt=S.patients.find(p=>p.id===o.patientId);
      return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid #e5e5e5;font-size:11px"><span>'+ptName(pt)+' -- '+o.panel+'</span><span class="badge '+statusBadge(o.status)+'">'+statusLabel(o.status)+'</span></div>';

    const ref=REF[r.testKey]; const fl=getFlag(r.testKey,r.value,pt?pt.sex:'M');
    return '<tr class="crit-row"><td>'+ptName(pt)+'</td><td>'+(ref?ref.name:r.testKey)+'</td>'+

      '<td><span class="'+fl.cls+'">'+fl.flag+'</span></td>'+
      '<td style="font-family:monospace;font-size:11px">'+(r.accession||'')+'</td>'+

    '<div class="stat"><div class="stat-label">Critical Callbacks</div><div class="stat-value" style="color:#a32d2d">'+crits+'</div></div></div>'+
    '<div class="grid2">'+

    wfRow('Ordered',pending,'badge-info')+wfRow('Accessioned',accessioned,'badge-warning')+
    wfRow('Received',received,'badge-purple')+wfRow('Resulted',resulted,'badge-success')+
    wfRow('Verified',verified,'badge-gray')+(rejected?wfRow('Rejected',rejected,'badge-danger'):'')+
    '</div><div class="card"><div class="card-title"><i class="ti ti-clock"></i>Recent Activity</div>'+recent+'</div></div>'+

    '<div class="empty" style="padding:12px">No pending critical callbacks</div>')+'</div>';

function enterResults(oid) {
  const o=S.orders.find(x=>x.id===oid); if(!o) return;
  const pt=S.patients.find(p=>p.id===o.patientId);
  _currentResultsPt = pt;
  _repeatableRows = {};
  const isPeds=pt&&age(pt.dob)<18;
  const sex=pt?pt.sex:'M';
  const existing={};
  S.results.filter(r=>r.orderId===oid).forEach(r=>{existing[r.testKey]=r.value;});
  const nonBinary=(sex==='X'||sex==='U');
  const rows=o.tests.map(tk=>{
    const r=REF[tk]; if(!r) return '';
    const rs=refSex(sex); let lo=r.lo, hi=r.hi;
    if(rs==='F'){if(r.femLo!=null)lo=r.femLo;if(r.femHi!=null)hi=r.femHi;}
    const pedsNote=isPeds&&r.peds?'<span style="color:#854f0b;font-size:10px"> Peds: '+r.peds+'</span>':'';
    const nbNote=nonBinary&&r.femLo!=null?'<span style="font-size:10px;color:#666"> (unisex)</span>':'';
    if(r.repeatable){

    }
    if(r.qualitative){
      return '<tr><td style="font-weight:500">'+r.name+'</td>'+
        '<td><select id="res_'+tk+'" style="padding:4px 6px;border:0.5px solid #ccc;border-radius:5px;font-size:12px;background:#fff;color:#111;font-family:inherit" '+
        'onchange="'+(r.reflex?'checkReflex();':'')+'checkPathFlags()">'+
        '<option value="">--</option>'+r.options.map(op=>'<option '+(existing[tk]===op?'selected':'')+'>'+op+'</option>').join('')+
        '</select></td><td style="font-size:11px;color:#666">'+r.options.join(' / ')+pedsNote+'</td><td id="flag_'+tk+'"></td></tr>';
    }
    return '<tr><td style="font-weight:500">'+r.name+'</td>'+
      '<td><input id="res_'+tk+'" type="number" step="any" value="'+(existing[tk]||'')+'" '+
      'style="width:90px;padding:4px 6px;border:0.5px solid #ccc;border-radius:5px;font-size:12px;background:#fff;color:#111;font-family:inherit" '+
      'oninput="liveFlag(\''+tk+'\',\''+sex+'\')"></td>'+
      '<td style="font-size:11px;color:#666">'+lo+'--'+hi+' '+r.unit+nbNote+pedsNote+'</td>'+
      '<td id="flag_'+tk+'"></td></tr>';
  }).join('');
  openModal('Enter Results -- '+o.accession,
    '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;font-size:12px;color:#666">'+
    '<strong>'+ptName(pt)+'</strong><span>'+sexLabel(sex)+'</span><span>Age '+(pt?age(pt.dob):'?')+'</span><span>'+o.panel+'</span>'+
    (isPeds?'<span class="badge badge-warning">Paediatric</span>':'')+
    (nonBinary?'<span class="badge badge-purple">Unisex ranges</span>':'')+
    '</div>'+
    '<div id="reflexBanner"></div>'+
    '<div id="pathFlagBanner"></div>'+
    '<table><thead><tr><th>Analyte</th><th>Result</th><th>Reference Range</th><th>Flag</th></tr></thead><tbody>'+rows+'</tbody></table>',
    [{label:'Cancel',cls:'btn',fn:closeModal},
     {label:'Save Results',cls:'btn btn-primary',fn:()=>{
      S.results=S.results.filter(r=>r.orderId!==oid);
      let hasCrit=false;
      o.tests.forEach(tk=>{
        const r=REF[tk];
        let val;
        if(r&&r.repeatable){ val=serializeRepeatableField(tk); }
        else { const el=document.getElementById('res_'+tk); val=el?el.value:''; }
        if(!val) return;
        const crit=isCrit(tk,val,sex);
        if(crit) hasCrit=true;
        S.results.push({id:'RES-'+Date.now()+'-'+tk,orderId:oid,testKey:tk,value:val,
          accession:o.accession,critical:crit,callbackDone:false,enteredAt:nowTime(),ts:Date.now()});
      });
      const flags=computePathFlags(pt);
      o.status='resulted'; o.pathFlagged=flags.length>0; o.pathFlagReasons=flags;
      closeModal();
      if(hasCrit) alert('CRITICAL VALUE(S) detected. Notify physician immediately and document callback.');
      if(flags.length) alert('REFERRED TO PATHOLOGIST FOR REVIEW: '+flags.join('; '));
      nav('verify');
    }}]);
  checkReflex();
  checkPathFlags();
}

// --- Repeatable type+range field support (Casts, Crystals) ---
// Stored/serialized as a semicolon-separated string, e.g. "Hyaline 0-2; Granular 3-5"
let _repeatableRows = {}; // tk -> array of {type, range}

function parseRepeatableValue(val) {
  if(!val) return [];
  return val.split(';').map(s=>s.trim()).filter(Boolean).map(part=>{
    const idx=part.lastIndexOf(' ');
    return idx>-1 ? {type:part.slice(0,idx).trim(), range:part.slice(idx+1).trim()} : {type:part, range:''};
  });
}

function renderRepeatableField(tk, r, existingVal) {
  if(!_repeatableRows[tk]) _repeatableRows[tk]=parseRepeatableValue(existingVal);
  if(_repeatableRows[tk].length===0) _repeatableRows[tk]=[];
  return '<div id="repWrap_'+tk+'">'+renderRepeatableRows(tk,r)+'</div>'+
    '<button type="button" class="btn btn-sm" style="margin-top:6px" onclick="addRepeatableRow(\''+tk+'\')"><i class="ti ti-plus"></i>Add finding</button>'+
    (r.pathTypes&&r.pathTypes.length?'<div style="font-size:10px;color:#854f0b;margin-top:4px">* Pathological -- selecting this type will flag the report for pathologist review</div>':'');
}

function renderRepeatableRows(tk, r) {
  const rows=_repeatableRows[tk]||[];
  if(rows.length===0) return '<div style="font-size:11px;color:#666">None added</div>';
  return rows.map((row,i)=>
    '<div style="display:flex;gap:6px;align-items:center;margin-bottom:5px">'+
    '<select id="repType_'+tk+'_'+i+'" style="padding:4px 6px;border:0.5px solid #ccc;border-radius:5px;font-size:12px;background:#fff;color:#111;font-family:inherit;flex:1" onchange="updateRepeatableRow(\''+tk+'\','+i+')">'+
    r.typeOptions.map(t=>'<option '+(row.type===t?'selected':'')+'>'+t+'</option>').join('')+
    '</select>'+
    '<select id="repRange_'+tk+'_'+i+'" style="padding:4px 6px;border:0.5px solid #ccc;border-radius:5px;font-size:12px;background:#fff;color:#111;font-family:inherit;width:90px" onchange="updateRepeatableRow(\''+tk+'\','+i+')">'+
    r.rangeOptions.map(rg=>'<option '+(row.range===rg?'selected':'')+'>'+rg+'</option>').join('')+
    '</select>'+
    '<button type="button" class="btn btn-sm btn-danger" onclick="removeRepeatableRow(\''+tk+'\','+i+')"><i class="ti ti-x"></i></button>'+
    '</div>'
  ).join('');
}

function addRepeatableRow(tk) {
  const r=REF[tk];
  if(!_repeatableRows[tk]) _repeatableRows[tk]=[];
  _repeatableRows[tk].push({type:r.typeOptions[0], range:r.rangeOptions[0]});
  document.getElementById('repWrap_'+tk).innerHTML=renderRepeatableRows(tk,r);
  checkPathFlags();
}
function removeRepeatableRow(tk,i) {
  _repeatableRows[tk].splice(i,1);
  document.getElementById('repWrap_'+tk).innerHTML=renderRepeatableRows(tk,REF[tk]);
  checkPathFlags();
}
function updateRepeatableRow(tk,i) {
  const typeEl=document.getElementById('repType_'+tk+'_'+i);
  const rangeEl=document.getElementById('repRange_'+tk+'_'+i);
  if(typeEl&&rangeEl){ _repeatableRows[tk][i]={type:typeEl.value, range:rangeEl.value}; }
  checkPathFlags();
}
function serializeRepeatableField(tk) {
  const rows=_repeatableRows[tk]||[];
  return rows.map(r=>r.type+' '+r.range).join('; ');
}

// --- Pathologist review auto-flagging ---
// Triggers: Oval Fat Bodies present; Renal Epithelial Cells present (any non-"Not present" value);
// any pathological crystal type selected (Cystine/Leucine/Tyrosine); Sperm present where patient is
// confirmed Female AND confirmed under 16 (unknown/missing sex or DOB does NOT trigger this one).
let _currentResultsPt = null; // set when enterResults() opens the modal; used by checkPathFlags

function computePathFlags(pt) {
  const reasons=[];
  const ofbEl=document.getElementById('res_UAM_OvalFatBodies');
  if(ofbEl&&ofbEl.value==='Present') reasons.push('Oval Fat Bodies present');

  const renalEl=document.getElementById('res_UAM_RenalEpi');
  if(renalEl&&renalEl.value&&renalEl.value!=='Not present') reasons.push('Renal Epithelial Cells present');

  ['UAM_CrystalsAcid','UAM_CrystalsAlkaline'].forEach(tk=>{
    const r=REF[tk]; if(!r||!r.pathTypes) return;
    const rows=_repeatableRows[tk]||[];
    rows.forEach(row=>{ if(r.pathTypes.includes(row.type)) reasons.push('Pathological crystal present: '+row.type.replace('*','')); });
  });

  const spermEl=document.getElementById('res_UAM_Sperm');
  if(spermEl&&spermEl.value==='Present'&&pt&&pt.sex==='F'&&pt.dob&&age(pt.dob)<16){
    reasons.push('Sperm present in a patient under 16');
  }
  return reasons;
}
function checkPathFlags() {
  const banner=document.getElementById('pathFlagBanner');
  if(!banner) return;
  const reasons=computePathFlags(_currentResultsPt);
  banner.innerHTML = reasons.length
    ? '<div class="danger-box"><i class="ti ti-alert-triangle"></i> <strong>REFERRED TO PATHOLOGIST FOR REVIEW</strong> -- '+reasons.join('; ')+'</div>'
    : '';
}
function checkReflex() {
  const banner=document.getElementById('reflexBanner');
  if(!banner) return;
  const triggered=[];
  Object.keys(REF).forEach(tk=>{
    const r=REF[tk]; if(!r||!r.reflex) return;
    const el=document.getElementById('res_'+tk);
    if(el&&el.value&&el.value.includes('*')) triggered.push(r.name+': '+el.value.replace('*',''));
  });
  banner.innerHTML = triggered.length
    ? '<div class="warn-box"><i class="ti ti-alert-triangle"></i> <strong>Reflex to microscopic examination suggested</strong> -- '+
      triggered.join(', ')+'. Consider also ordering UA-MICRO and document in the Reflex / Notes field.</div>'
    : '';
}
function liveFlag(tk,sex) {
  const el=document.getElementById('res_'+tk);
  const flagEl=document.getElementById('flag_'+tk);
  if(!el||!flagEl) return;
  const f=getFlag(tk,el.value,sex);
  flagEl.innerHTML=f.flag?'<span class="'+f.cls+'">'+f.flag+'</span>':'';
}

  const o=S.orders.find(x=>x.id===oid);
  const pt=S.patients.find(p=>p.id===o.patientId);

  const sex=pt?pt.sex:'M';
  const rows=res.map(r=>{
    const ref=REF[r.testKey]; const fl=getFlag(r.testKey,r.value,sex);
    const rs=refSex(sex); let lo=ref?ref.lo:null, hi=ref?ref.hi:null;
    if(rs==='F'){if(ref&&ref.femLo!=null)lo=ref.femLo;if(ref&&ref.femHi!=null)hi=ref.femHi;}
    return '<tr '+(r.critical?'class="crit-row"':'')+'>'+
      '<td>'+(ref?ref.name:r.testKey)+'</td>'+

      '<td style="font-size:11px;color:#666">'+(ref&&!ref.qualitative&&!ref.freetext?lo+'--'+hi:'--')+'</td></tr>';

function toggleCheck(key,checked) { checklistState[key]=checked?'met':undefined; renderChecklist(); }
